services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zbank
      POSTGRES_USER: zbank
      POSTGRES_PASSWORD: zbank
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zbank"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: alpine
    command: sh -c "chown -R 65532:65532 /data"
    volumes:
      - miniodata:/data

  minio:
    image: cgr.dev/chainguard/minio:latest
    depends_on:
      minio-init:
        condition: service_completed_successfully
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "1337:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  zbank-api:
    build: ./zbank-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      chart-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/zbank
      SPRING_DATASOURCE_USERNAME: zbank
      SPRING_DATASOURCE_PASSWORD: zbank
      MINIO_ENDPOINT: http://minio:9000
      CHART_SERVICE_URL: http://chart-service:8081
    restart: unless-stopped

  lighttpd:
    build: 
      context: .
      dockerfile: ./lighttpd/Dockerfile
    ports:
      - "8081:8080"
    depends_on:
      - zbank-api
    restart: unless-stopped

  statement-worker:
    build: ./statement-worker
    depends_on:
      - zbank-api
    environment:
      API_BASE: http://zbank-api:8888
      POLL_INTERVAL: "5"
    restart: unless-stopped

  chart-service:
    build: ./chart-service
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  miniodata:
  redisdata:
