server.modules += (
    "mod_proxy",
    "mod_accesslog",
    "mod_setenv"
)

server.document-root = "/var/www/html"
server.port = 8080
server.bind = "0.0.0.0"

# Access log
accesslog.filename = "/dev/stderr"

# Remove the X-Local-Job header from incoming requests
# This prevents external clients from forging internal auth headers
setenv.set-request-header = (
    "X-Local-Job" => ""
)

# Proxy all requests to the Spring Boot API
proxy.server = (
    "" => (
        (
            "host" => "zbank-api",
            "port" => 8888
        )
    )
)
