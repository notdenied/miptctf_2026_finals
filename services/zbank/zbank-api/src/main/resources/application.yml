server:
  port: 8888

spring:
  application:
    name: zbank-api
  datasource:
    url: jdbc:postgresql://postgres:5432/zbank
    username: zbank
    password: zbank
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

minio:
  endpoint: http://minio:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: statements

chart:
  service:
    url: http://chart-service:8081

logging:
  level:
    com.zbank: INFO
